<!DOCTYPE html>
<html>
<head>
  <title>Kalkulator Mini</title>
</head>
<body>
  <input type="number" id="angka1" placeholder="Angka 1">
  <input type="number" id="angka2" placeholder="Angka 2">
  <input type="number" id="angka3" placeholder="Angka 3">
  <button id="hitung">Hitung Tambah</button>
  <p id="hasil">Hasil: </p>
  
  <script>
    function tambah(a, b, c) {  // Function reusable
      return a + b + c;
    }
    
    document.getElementById("hitung").addEventListener("click", function() {
      let a = parseInt(document.getElementById("angka1").value);
      let b = parseInt(document.getElementById("angka2").value);
let c = parseInt(document.getElementById("angka3").value);

      let total = tambah(a, b, c);  // Panggil function
      document.getElementById("hasil").innerHTML = `Hasil: ${total}`;
    });
  </script>
</body>
</html>
